repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uvx ty check
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

  # Dogfood our own new-file-tests hook.
  - repo: local
    hooks:
      - id: new-file-tests
        name: warn on new .py files without a matching test
        entry: python hooks/pre-commit-new-file-tests.py
        language: python
        types: [python]
