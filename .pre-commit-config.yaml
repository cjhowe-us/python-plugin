repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        pass_filenames: false

  # Dogfood our own new-file-tests hook.
  - repo: local
    hooks:
      - id: new-file-tests
        name: warn on new .py files without a matching test
        entry: python hooks/pre-commit-new-file-tests.py
        language: python
        types: [python]
