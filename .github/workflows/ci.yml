name: python-plugin CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  mypy:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - run: uv pip install --system -e ".[dev]"
      - run: python -m mypy

  hooks-smoke:
    name: hook smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Each hook is syntactically importable + a no-op on empty stdin
        run: |
          for h in hooks/posttooluse-*.py; do
            echo "=> $h"
            : | python3 "$h"
          done
